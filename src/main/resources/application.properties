spring.application.name=telehealth

# Veritabani Ayarlari
# Gercek sifre environment variable olarak verilmeli: DB_PASSWORD
spring.datasource.url=jdbc:mysql://localhost:3306/telehealth_db
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD:sifre}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT Ayarlari
# Gercek secret environment variable olarak verilmeli: JWT_SECRET
jwt.secret=${JWT_SECRET:TeleSaglikPlatformuGizliAnahtar2026GucluSifre!}
jwt.expiration=86400000
