spring.application.name=telehealth

# Veritabani Ayarlari
spring.datasource.url=jdbc:mysql://localhost:3306/telehealth_db
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD:ZorZorZor2006.}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT Ayarlari
jwt.secret=${JWT_SECRET:TeleSaglikPlatformuGizliAnahtar2026GucluSifre!}
jwt.expiration=86400000

# Jackson — Tarih/saat ayarları
# Not: Spring Boot 4.x + Jackson 3.x varsayılan olarak ISO-8601 string formatı kullanır
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss
spring.jackson.time-zone=Europe/Istanbul

# Logging — sadece hataları göster
logging.level.root=WARN
logging.level.com.healthtech=INFO
