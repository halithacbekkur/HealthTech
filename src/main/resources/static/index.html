<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="HealthTech - Profesyonel Tele-Sağlık Platformu. Online randevu, tıbbi kayıt ve reçete yönetimi.">
    <title>HealthTech | Tele-Sağlık Platformu</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- App CSS -->
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <!-- Loading Screen -->
    <div id="loading-screen" class="loading-screen">
        <div class="loading-content">
            <div class="pulse-ring"></div>
            <i class="fa-solid fa-heartbeat loading-icon"></i>
            <h2>HealthTech</h2>
            <p>Yükleniyor...</p>
        </div>
    </div>

    <!-- Main App Container -->
    <div id="app" class="app-container" style="display:none;">
        <div id="sidebar-overlay" class="sidebar-overlay"></div>
        <!-- Sidebar Navigation -->
        <nav id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fa-solid fa-heart-pulse"></i>
                    <span>HealthTech</span>
                </div>
                <button id="sidebar-toggle" class="sidebar-toggle" aria-label="Menüyü kapat">
                    <i class="fa-solid fa-bars"></i>
                </button>
            </div>
            <div class="sidebar-user" id="sidebar-user">
                <div class="user-avatar" id="user-avatar">
                    <i class="fa-solid fa-user"></i>
                </div>
                <div class="user-info">
                    <span class="user-name" id="user-name">Kullanıcı</span>
                    <span class="user-role" id="user-role-badge">Rol</span>
                </div>
            </div>
            <ul class="nav-menu" id="nav-menu">
                <!-- Dinamik olarak doldurulacak -->
            </ul>
            <div class="sidebar-footer">
                <button id="btn-logout" class="nav-link logout-btn">
                    <i class="fa-solid fa-right-from-bracket"></i>
                    <span>Çıkış Yap</span>
                </button>
            </div>
        </nav>

        <!-- Main Content Area -->
        <main class="main-content">
            <!-- Top Bar -->
            <header class="topbar">
                <button id="mobile-menu-btn" class="mobile-menu-btn" aria-label="Menü">
                    <i class="fa-solid fa-bars"></i>
                </button>
                <div class="topbar-title">
                    <h1 id="page-title">Dashboard</h1>
                </div>
                <div class="topbar-actions">
                    <div class="topbar-time" id="topbar-time"></div>
                    <div class="topbar-user-mini" id="topbar-user-mini">
                        <i class="fa-solid fa-circle-user"></i>
                    </div>
                </div>
            </header>

            <!-- Dynamic Page Content -->
            <div id="page-content" class="page-content">
                <!-- Sayfa içeriği JS tarafından render edilecek -->
            </div>
        </main>
    </div>

    <!-- Auth Pages (Login/Register) -->
    <div id="auth-container" class="auth-container" style="display:none;">
        <div class="auth-bg">
            <div class="floating-shapes">
                <div class="shape shape-1"></div>
                <div class="shape shape-2"></div>
                <div class="shape shape-3"></div>
                <div class="shape shape-4"></div>
                <div class="shape shape-5"></div>
            </div>
        </div>
        <div class="auth-card">
            <div class="auth-header">
                <i class="fa-solid fa-heart-pulse auth-logo-icon"></i>
                <h1>HealthTech</h1>
                <p id="auth-subtitle">Tele-Sağlık Platformu</p>
            </div>
            <div id="auth-form-container">
                <!-- Login/Register form JS tarafından render edilecek -->
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Modal -->
    <div id="modal-overlay" class="modal-overlay" style="display:none;">
        <div class="modal" id="modal">
            <div class="modal-header">
                <h3 id="modal-title">Modal</h3>
                <button class="modal-close" id="modal-close" aria-label="Kapat">&times;</button>
            </div>
            <div class="modal-body" id="modal-body"></div>
            <div class="modal-footer" id="modal-footer"></div>
        </div>
    </div>

    <!-- App JS -->
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/pages.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
